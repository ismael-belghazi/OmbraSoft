version: "3.9"

services:
  api:
    build: .
    container_name: ombrasoft-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@db:5432/ombrasoft?sslmode=disable
      - JWT_SECRET=dev-secret
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: ombrasoft-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ombrasoft
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
