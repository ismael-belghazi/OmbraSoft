    version: "3.9"

    services:

      #######################################
      # BACKEND
      #######################################
      backend:
        build:
          context: ./backend
          dockerfile: Dockerfile
        container_name: ombrasoft-backend
        restart: unless-stopped
        shm_size: 2gb
        ports:
          - "8080:8080"
        environment:
          PORT: ${PORT}
          GIN_MODE: ${GIN_MODE}
          DATABASE_URL: ${DATABASE_URL}
          DB_HOST: db
          DB_PORT: 5432
          DB_USER: ${DB_USER}
          DB_PASSWORD: ${DB_PASSWORD}
          DB_NAME: ${DB_NAME}
          DB_SSLMODE: ${DB_SSLMODE} 
          JWT_SECRET: ${JWT_SECRET}
          ALLOW_ORIGINS: ${ALLOW_ORIGINS}
          REDIS_URL: ${REDIS_URL}
          APPRISE_URL: http://apprise:8000
          SCREENSHOT_DIR: /app/screenshots
        volumes:
          - ./screenshots:/app/screenshots
          - playwright-cache:/ms-playwright
          - playwright-profile:/root/.cache/playwright-profile
          - ./backend/public/covers:/app/public/covers
        depends_on:
          db:
            condition: service_healthy
          apprise:
            condition: service_started
        networks:
          - ombrasoft-network
        healthcheck:
          test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
          interval: 10s
          timeout: 5s
          retries: 5
          
      #######################################
      # APPRISE
      #######################################
      apprise:
        image: caronc/apprise:latest
        container_name: ombrasoft-apprise
        restart: unless-stopped
        ports:
          - "8000:8000"
        networks:
          - ombrasoft-network

      #######################################
      # POSTGRES
      #######################################
      db:
        image: postgres:16-alpine
        container_name: ombrasoft-db
        restart: unless-stopped
        environment:
          POSTGRES_USER: ${DB_USER}
          POSTGRES_PASSWORD: ${DB_PASSWORD}
          POSTGRES_DB: ${DB_NAME}
        ports:
          - "5432:5432"
        volumes:
          - pgdata:/var/lib/postgresql/data
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
          interval: 10s
          timeout: 5s
          retries: 5
        networks:
          - ombrasoft-network

      #######################################
      # FRONTEND
      #######################################
      frontend:
        build:
          context: ./frontend
          dockerfile: Dockerfile
        container_name: ombrasoft-frontend
        restart: unless-stopped
        ports:
          - "5173:5173"
        environment:
          VITE_API_URL: "http://localhost:8080"
        networks:
          - ombrasoft-network

      #######################################
      # PGADMIN
      #######################################
      pgadmin:
        image: dpage/pgadmin4:latest
        container_name: ombrasoft-pgadmin
        restart: unless-stopped
        environment:
          PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
          PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
          - "5050:80"
        depends_on:
          - db
        networks:
          - ombrasoft-network

    volumes:
      pgdata:
      playwright-cache:
      playwright-profile:

    networks:
      ombrasoft-network:
        driver: bridge